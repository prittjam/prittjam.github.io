- id: pritts-bmvc16
  title: 'Coplanar Repeats by Energy Minimization'
  authors: 'J. Pritts, D. Rozumnyi, M. P. Kumar, O. Chum'
  venue: 'British Machine Vision Conference (BMVC) 2016'
  thumb: './img/papers/Pritts-BMVC16-thumb.jpg'
  alt: ''
  width: 640
  height: 360
  links:
    - { label: 'pdf', href: 'http://arxiv.org/pdf/1711.09432' }
    - { label: 'poster', href: 'https://goo.gl/txjyMi' }
  abstract: 'This paper proposes an automated method to detect, group and rectify arbitrarily-arranged coplanar repeats via energy minimization. The proposed energy functional combines several features reflecting how planes with repeated elements are built and projected into images. The scene is modeled globally, so discriminating interactions between different coplanar repeat groups and scene planes can be captured. An inference framework based on a recent variant of alpha expansion is described and fast convergence is demonstrated. The proposed method is evaluated using a new dataset of annotated images containing coplanar repeats in diverse arrangements. The dataset will be made publicly available. A significant improvement in rectifications estimated from detected coplanar repeats is reported with respect to two widely used geometric multi-model fitting methods.'
