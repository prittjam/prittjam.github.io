- id: pritts-cvpr18
  title: 'Radially-Distorted Conjugate Translations'
  authors: 'J. Pritts, Z. Kukelova, V. Larsson, O. Chum'
  venue: 'Conference on Computer Vision and Pattern Recognition (CVPR) 2018'
  thumb: './img/papers/Pritts-CVPR18-thumb.jpg'
  alt: ''
  width: 640
  height: 360
  links:
    - { label: 'pdf', href: 'https://arxiv.org/pdf/1711.11339.pdf' }
    - { label: 'code', href: 'https://github.com/prittjam/repeats' }
    - { label: 'slides', href: 'https://www.slideshare.net/jbpritts/radiallydistorted-conjugate-translations' }
    - { label: 'poster', href: 'https://drive.google.com/file/d/179HiQU7alp-8Z8QNS2xjjLqNHEStnA8U/view' }
  abstract: 'This paper introduces the first minimal solvers that jointly solve for affine-rectification and radial lens distortion from coplanar repeated patterns. Even with imagery from moderately distorted lenses, plane rectification using the pinhole camera model is inaccurate or invalid. The proposed solvers incorporate lens distortion into the camera model and extend accurate rectification to wide-angle imagery, which is now common from consumer cameras. The solvers are derived from constraints induced by the conjugate translations of an imaged scene plane, which are integrated with the division model for radial lens distortion. The hidden-variable trick with ideal saturation is used to reformulate the constraints so that the solvers generated by the Grobner-basis method are stable, small and fast. Rectification and lens distortion are recovered from either one conjugately translated affine-covariant feature or two independently translated similarity-covariant features. The proposed solvers are used in a \RANSAC-based estimator, which gives accurate rectifications after few iterations. The proposed solvers are evaluated against the state-of-the-art and demonstrate significantly better rectifications on noisy measurements. Qualitative results on diverse imagery demonstrate high-accuracy undistortions and rectifications.'
