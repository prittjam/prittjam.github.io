- id: ransac
  title: 'RANSAC Scoring Done Right'
  authors: 'J. Pritts, F. Seegräber, K. Köser'
  venue: 'arXiv preprint arXiv:2606.27385, 2026'
  thumb: './img/papers/Pritts-arXiv26-thumb.jpg'
  alt: 'RANSAC Scoring Done Right — profile curves'
  width: 640
  height: 360
  links:
    - { label: 'pdf', href: 'https://arxiv.org/pdf/2606.27385' }
    - { label: 'arXiv', href: 'https://arxiv.org/abs/2606.27385' }
  abstract: 'The most widely used RANSAC variants score candidate models by counting inliers or summing per-point scores that saturate beyond a residual threshold. Every such score requires a user-supplied parameter that is a function of the inlier scale, which must itself be estimated from contaminated data. We remove this dependence by reversing the usual order of inference: rather than estimating the scale and then scoring against it, we marginalize the inlier scale analytically in closed form under a conjugate Inverse-Gamma prior for a fixed inlier partition, then optimize over partitions. A single closed-form expression spans the non-informative Jeffreys limit and informative empirical-Bayes priors, so the same score adapts across data-rich and data-scarce regimes without any change to the algorithm. The proposed RANSAC score is the first in which the inlier scale is genuinely absent from the formula. The score admits O(N log N) computation via sort-and-sweep. On a benchmark of nearly 70,000 image pairs spanning different two-view estimation problems and both engineered and learned feature pipelines, the proposed score exceeds the state of the art (RANSAC, MSAC, GaU, MAGSAC): it stays nearly flat under threshold miscalibration where baselines degrade, reaches near-optimal accuracy from as few as two validation pairs where baselines need on the order of 100 times more, and tightens its prior regularization as validation data grows scarce.'
  bibtex: |
    @article{pritts2026ransac,
      title   = {RANSAC Scoring Done Right},
      author  = {Pritts, James and Seegr{\"a}ber, Felix and K{\"o}ser, Kevin},
      journal = {arXiv preprint arXiv:2606.27385},
      year    = {2026}
    }

- id: dexheimer-icra22
  title: 'Information-Theoretic Online Multi-Camera Extrinsic Calibration'
  authors: 'E. Dexheimer, P. Peluse, J. Chen, J. Pritts, and M. Kaess'
  venue: 'IEEE Robotics and Automation Letters, 2022'
  thumb: './img/papers/Dexheimer-ICRA22-thumb.jpg'
  alt: ''
  width: 1311
  height: 765
  links:
    - { label: 'pdf', href: 'doc/dexheimer-icra22.pdf' }
    - { label: 'code', href: 'https://github.com/edexheim/info_ext_calib' }
  abstract: 'Calibration of multi-camera systems is essential for lifelong use of vision-based headsets and autonomous robots. In this work, we present an information-based framework for online extrinsic calibration of multi-camera systems. While previous work largely focuses on monocular, stereo, or strictly non-overlapping field-of-view (FoV) setups, we allow arbitrary configurations while also exploiting overlapping pairwise FoV when possible. In order to efficiently solve for the extrinsic calibration parameters, which increase linearly with the number of cameras, we propose a novel entropy-based keyframe measure and bound the backend optimization complexity by selecting informative motion segments that minimize the maximum entropy across all extrinsic parameter partitions. We validate the pipeline on three distinct platforms to demonstrate the generality of the method for resolving the extrinsics and performing downstream tasks.'
  bibtex: |
    @ARTICLE{9691878,
      author={Dexheimer, Eric and Peluse, Patrick and Chen, Jianhui and Pritts, James and Kaess, Michael},
      journal={IEEE Robotics and Automation Letters}, 
      title={Information-Theoretic Online Multi-Camera Extrinsic Calibration}, 
      year={2022},
      volume={7},
      number={2},
      pages={4757-4764},
      doi={10.1109/LRA.2022.3145061}}

- id: lochman-iccv21
  title: 'BabelCalib: A Universal Approach to Calibrating Central Cameras'
  authors: 'Y. Lochman, K. Liepieshov, J. Chen, M. Perdoch, C. Zach, J. Pritts'
  venue: 'International Conference on Computer Vision (ICCV) 2021'
  thumb: './img/papers/Lochman-ICCV21-thumb.jpg'
  alt: ''
  width: 640
  height: 360
  links:
    - { label: 'pdf', href: 'https://arxiv.org/pdf/2109.09704.pdf' }
    - { label: 'code', href: 'https://github.com/ylochman/babelcalib' }
  abstract: 'Existing calibration methods occasionally fail for large field-of-view cameras due to the non-linearity of the underlying problem and the lack of good initial values for all parameters of the used camera model. This might occur because a simpler projection model is assumed in an initial step, or a poor initial guess for the internal parameters is pre-defined. A lot of the difficulties of general camera calibration lie in the use of a forward projection model. We side-step these challenges by first proposing a solver to calibrate the parameters in terms of a back-projection model and then regress the parameters for a target forward model. These steps are incorporated in a robust estimation framework to cope with outlying detections. Extensive experiments demonstrate that our approach is very reliable and returns the most accurate calibration parameters as measured on the downstream task of absolute pose estimation on test sets.'
  bibtex: |
    @InProceedings{Lochman-ICCV21,
        title     = {BabelCalib: A Universal Approach to Calibrating Central Cameras},
        author    = {Lochman, Yaroslava and Liepieshov, Kostiantyn and Chen, Jianhui and Perdoch, Michal and Zach, Christopher and Pritts, James},
        booktitle = {Proceedings of the IEEE/CVF International Conference on Computer Vision (ICCV)},
        year      = {2021},
        pages     = {15253-15262}
    }

- id: lochman-wacv21
  title: 'Minimal Solvers for Single-View Lens-Distorted Camera Auto-Calibration'
  authors: 'Y. Lochman, O. Dobosevych, R. Hyrniv, J. Pritts'
  venue: 'Winter Conference on Applications of Computer Vision (WACV) 2021'
  thumb: './img/papers/Lochman-WACV21-thumb.jpg'
  alt: ''
  width: 640
  height: 360
  links:
    - { label: 'pdf', href: 'https://arxiv.org/pdf/2011.08988.pdf' }
    - { label: 'code', href: 'https://github.com/ucuapps/single-view-autocalib' }
  abstract: 'This paper proposes minimal solvers that use combinations of imaged translational symmetries and parallel scene lines to jointly estimate lens undistortion with either affine rectification or focal length and absolute orientation. We use constraints provided by orthogonal scene planes to recover the focal length. We show that solvers using feature combinations can recover more accurate calibrations than solvers using only one feature type on scenes that have a balance of lines and texture. We also show that the proposed solvers are complementary and can be used together in a RANSAC-based estimator to improve auto-calibration accuracy. State-of-the-art performance is demonstrated on a standard dataset of lens-distorted urban images.'
