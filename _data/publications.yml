- id: pritts-ivcnz13
  title: 'Approximate Models for Fast and Accurate Epipolar Geometry Estimation'
  authors: 'J. Pritts, O. Chum, J. Matas'
  venue: 'Image and Vision Computing New Zealand (IVCNZ) 2013'
  thumb: './img/papers/Pritts-IVCVNZ13-thumb.jpg'
  alt: ''
  width: 640
