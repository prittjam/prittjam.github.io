    @ARTICLE{9086062,
      author={Pritts, James and Kukelova, Zuzana and Larsson, Viktor and Lochman, Yaroslava and Chum, Ondřej},
      journal={IEEE Transactions on Pattern Analysis and Machine Intelligence}, 
      title={Minimal Solvers for Rectifying From Radially-Distorted Conjugate Translations}, 
      year={2021},
      volume={43},
      number={11},
      pages={3931-3948},
      doi={10.1109/TPAMI.2020.2992261}}

- id: pritts-ijcv20
  title: 'Minimal Solvers for Rectifying from Radially-Distorted Scales and Change of Scales'
  authors: 'J. Pritts, Z. Kukelova, V. Larsson, Y. Lochman, O. Chum'
  venue: 'International Journal of Computer Vision (IJCV) 2020'
  thumb: './img/papers/Pritts-IJCV20-thumb.jpg'
  alt: ''
  width: 640
  height: 360
  links:
    - { label: 'pdf', href: 'https://arxiv.org/pdf/1907.11539.pdf' }
    - { label: 'code', href: 'https://github.com/prittjam/repeats' }
  abstract: 'This paper introduces the first minimal solvers that jointly estimate lens distortion and affine rectification from the image of rigidly-transformed coplanar features. The solvers work on scenes without straight lines and, in general, relax strong assumptions about scene content made by the state of the art. The proposed solvers use the affine invariant that coplanar repeats have the same scale in rectified space. The solvers are separated into two groups that differ by how the equal scale invariant of rectified space is used to place constraints on the lens undistortion and rectification parameters. We demonstrate a principled approach for generating stable minimal solvers by the Gröbner basis method, which is accomplished by sampling feasible monomial bases to maximize numerical stability. Synthetic and real-image experiments confirm that the proposed solvers demonstrate superior robustness to noise compared to the state of the art. Accurate rectifications on imagery taken with narrow to fisheye field-of-view lenses demonstrate the wide applicability of the proposed method. The method is fully automatic.'
